<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Entregas</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>

    <main class="app-container">
        <header class="app-header">
            <h2>
                <img src="./assets/images/whatsapp-icon.svg" width="28" height="28" alt="WhatsApp">
                Avisar Cliente
            </h2>
        </header>

        <div class="form-row">
            <div class="form-group half-width">
                <label for="empresa">Empresa</label>
                <select id="empresa">
                    <option value="">...</option>
                </select>
            </div>
            <div class="form-group half-width">
                <label for="entregador">Seu Nome (Salva Auto)</label>
                <input type="text" id="entregador" placeholder="Ex: Carlos" />
            </div>
        </div>

        <fieldset class="client-data">
            <legend>Dados do Destinatário</legend>
            <div class="form-row">
                <div class="form-group ">
                    <label for="codigo">Código Pacote (X-999)</label>
                    <div class="codigo-group">
                        <input type="text" id="letras" placeholder="Letras"/> _ 
                        <input type="text" id="codigo" placeholder="Números" />
                        <span id="erro-codigo"></span>
                    </div>
                </div>
                <div class="form-group nome-group">
                    <label for="nome">Nome Cliente</label>
                    <input type="text" id="nome" placeholder="..." />
                </div>
            </div>
            <div class="form-group">
                <label for="numero">WhatsApp do Cliente</label>
                <div class="phone-group">
                    <input type="text" value="+55" id="pais" disabled />
                    <input type="tel" id="ddd" maxlength="2" />
                    <input type="tel" id="numero" placeholder="90000-0000" maxlength="10" />
                </div>
            </div>
            <button type="button" class="btn-limpar-hist" onclick="limparHistoricoClientes()">
                Limpar Histórico de Destinatários
            </button>
        </fieldset>

        <div class="form-group mensagem-label-group">
            <label for="mensagem">Mensagem Padrão</label>
            <button id="btn-editar-mensagem" type="button" class="btn-icon" aria-label="Abrir editor de mensagens">⚙️</button>
        </div>
        <div class="form-group">
            <select id="mensagem">
                <option value="">Carregando...</option>
            </select>
            <div id="messagePreview" class="message-preview-box"></div>
        </div>

        <button class="btn-enviar" onclick="enviarWhatsApp()">
            Enviar no WhatsApp ➔
        </button>

    </main>

    <dialog id="modal-editor" class="dialog-editor">
        <form method="dialog" id="form-editor">
            <h3>Editar mensagem padrão</h3>

            <div class="form-group modal-header-group">
                <label for="btn-toggle-add-edit" class="modal-label">Modo</label>
                <button id="btn-toggle-add-edit" type="button" class="btn-icon" aria-label="Alternar modo Adicionar/Editar">✎</button>
            </div>
            <div class="form-group" id="modal-seletor-group">
                <label for="modal-mensagem-seletor">Selecione a mensagem</label>
                <select id="modal-mensagem-seletor"></select>
            </div>

            <div class="form-group" id="modal-titulo-group">
                <label for="modal-mensagem-titulo">Título da mensagem</label>
                <input type="text" id="modal-mensagem-titulo" placeholder="Digite um título para esta mensagem" />
            </div>
            <div class="form-group">
                <label for="modal-mensagem-template">Texto da mensagem</label>
                <textarea id="modal-mensagem-template" rows="4"></textarea>
                <div id="placeholder-buttons" class="placeholder-container"></div>
            </div>

            <div class="form-group editor-actions">
                <button id="btn-excluir-mensagem" type="button" class="btn-excluir">🗑️</button>
                <button id="btn-limpar-personalizadas" type="button" class="btn-alterar">Limpar personalizadas</button>
                <button id="btn-recarregar-defaults" type="button" class="btn-alterar">Recarregar padrões</button>
            </div>

            <menu>
                <button id="btn-cancelar-editor" type="button">Cancelar</button>
                <button id="btn-salvar-editor" type="button">Salvar</button>
            </menu>
        </form>
    </dialog>

    <script src="./scripts/components/editor_mensagens.js"></script>
    <script src="./scripts/app.js"></script>
</body>

</html>
