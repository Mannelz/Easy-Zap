<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Entregas</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

    <main class="app-container">
        <h2>
            <img src="./assets/images/whatsapp-icon.svg" width="28" height="28" alt="WhatsApp">
            Avisar Cliente
        </h2>

        <!-- Novos Campos -->
        <div class="form-group">
            <label>Nome do Cliente</label>
            <input type="text" id="nome" placeholder="Ex: João da Silva" />
        </div>

        <div class="form-group form-row">
            <div class="half-width">
                <label>Empresa</label>
                <select id="empresa">
                    <option value="">Carregando...</option>
                </select>
            </div>
            <div class="half-width">
                <label>Cód. Entrega</label>
                <input type="text" id="codigo" placeholder="Ex: BR12345" />
            </div>
        </div>

        <!-- Telefone (DDD default para 31 via JS) -->
        <div class="form-group">
            <label>WhatsApp do Cliente</label>
            <div class="phone-group">
                <input type="text" value="+55" id="pais" disabled title="Código do País" />
                <input type="tel" id="ddd" maxlength="2" placeholder="DDD" />
                <input type="tel" id="numero" placeholder="90000-0000" maxlength="10" />
            </div>
        </div>

        <div class="form-group">
            <label for="mensagem">Mensagem</label>
            <select id="mensagem">
                <option value="">Carregando...</option>
            </select>
            <small class="hint">Use <b>{nome}</b>, <b>{empresa}</b> e <b>{codigo}</b> para textos personalizados.</small>
        </div>

        <div class="form-group" id="caixaCustomizada" style="display: none;">
            <textarea id="textoNovaMensagem" rows="3" placeholder="Ex: Olá {nome}, seu pedido {codigo} chegou!"></textarea>
            
            <label class="checkbox-label">
                <input type="checkbox" id="salvarMensagemCheck" checked>
                Salvar esta mensagem para as próximas corridas
            </label>
            
            <button type="button" class="btn-limpar" id="btnLimparSalvas" onclick="limparMensagensSalvas()">Apagar minhas mensagens salvas</button>
        </div>

        <button class="btn-enviar" onclick="enviarWhatsApp()">
            Enviar no WhatsApp ➔
        </button>

    </main>

    <script src="./scripts/app.js"></script>
</body>
</html>
